<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST</title>
</head>

<body>

<h1>Test Admin</h1>

<button onclick="toggleAdmin()">Admin</button>

<div id="panel" style="display:none; border:2px solid red; padding:10px;">
ADMIN FUNGUJE
</div>

<script>
function toggleAdmin() {
  var p = document.getElementById("panel");
  if (p.style.display === "none") {
    p.style.display = "block";
  } else {
    p.style.display = "none";
  }
}
</script>

</body>
</html>
