
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školní datový editor – adaptivní</title>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--line:#d9e2ef;--text:#1f2937;--muted:#64748b;--blue:#2563eb;--green:#0f766e;--red:#b91c1c}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button,input,textarea{font:inherit} button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 11px;cursor:pointer}
button.primary{background:var(--blue);color:#fff;border-color:var(--blue)} button.accent{background:var(--green);color:#fff;border-color:var(--green)} button.warn{background:#fff1f2;border-color:#fecdd3;color:var(--red)}
.wrap{display:grid;grid-template-columns:320px 1fr;gap:12px;padding:12px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}
.field{margin-bottom:10px}.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}.field input,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px}
.field textarea{min-height:80px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.status{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#f8fafc;white-space:pre-line}
.hidden{display:none!important}
.sheet-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;overflow:auto}
table{border-collapse:collapse;min-width:900px} th,td{border:1px solid var(--line);min-width:96px;height:34px;padding:6px 8px} th{background:#f8fafc;text-align:center}
td.active{outline:2px solid var(--blue);outline-offset:-2px;background:#dbeafe} td.range{background:#eff6ff}
.list{max-height:250px;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:8px}
.item{padding:8px 6px;border-bottom:1px dashed #e5e7eb;font-size:13px}.item:last-child{border-bottom:none}
.report{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
#qr img{max-width:180px;max-height:180px;border:1px solid var(--line);border-radius:12px}
.muted{font-size:12px;color:var(--muted)}
@media print{body *{visibility:hidden}#reportSection,#reportSection *{visibility:visible}#reportSection{position:absolute;left:0;top:0;width:100%}}
@media (max-width:1000px){.wrap{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top">
  <strong>Školní datový editor</strong>
  <button id="adminBtn" class="warn">Admin</button>
  <button id="shareBtn">Sdílet</button>
  <button id="evalBtn" class="primary">Vyhodnotit</button>
  <button id="pdfBtn">PDF vysvědčení</button>
  <button id="dashBtn">Live dashboard</button>
  <button id="boldBtn">B</button>
  <button id="centerBtn">Na střed</button>
  <button id="fillBtn">Žlutá</button>
  <button id="clearBtn">Vymazat</button>
</div>

<div class="wrap">
  <div class="panel">
    <h3>Žák</h3>
    <div class="grid2">
      <div class="field"><label>Jméno</label><input id="studentName"></div>
      <div class="field"><label>Třída</label><input id="studentClass"></div>
    </div>
    <div class="field"><label>Název zadání</label><input id="taskTitle" readonly></div>
    <div class="field"><label>Aktuální úloha</label><textarea id="taskText" readonly></textarea></div>
    <div class="field"><label>Úroveň</label><input id="taskLevel" readonly></div>
    <div id="status" class="status">Připraveno.</div>

    <div id="adminPanel" class="hidden" style="margin-top:12px">
      <h3>Admin učitele</h3>
      <div class="grid2">
        <div class="field"><label>PIN</label><input id="teacherPin" type="password" value="1234"></div>
        <div class="field"><label>Apps Script URL</label><input id="scriptUrl"></div>
      </div>
      <div class="field"><label>Název sady</label><input id="adminTitle" value="Adaptivní práce s tabulkou"></div>
      <div class="field"><label>Úlohy (JSON)</label><textarea id="taskJson"></textarea></div>
      <button id="defaultBtn" class="accent">Výchozí úlohy</button>
      <button id="saveAdminBtn" class="primary">Uložit nastavení</button>
    </div>

    <div id="sharePanel" class="hidden" style="margin-top:12px">
      <h3>Sdílení pro žáky</h3>
      <div class="field"><label>Žákovský odkaz</label><textarea id="shareUrl" readonly></textarea></div>
      <button id="copyLinkBtn">Kopírovat odkaz</button>
      <div id="qr" style="margin-top:10px"></div>
    </div>

    <div id="dashboardPanel" class="hidden" style="margin-top:12px">
      <h3>Live dashboard</h3>
      <button id="refreshDashBtn">Obnovit</button>
      <div id="dashSummary" class="muted" style="margin:8px 0">Bez dat.</div>
      <div id="dashList" class="list"></div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="sheet-wrap"><table id="sheet"></table></div>
    </div>
    <div class="panel" id="reportSection" style="margin-top:12px">
      <h3>Výsledkový list</h3>
      <div class="report">
        <div><strong>Žák:</strong> <span id="rName">—</span></div>
        <div><strong>Třída:</strong> <span id="rClass">—</span></div>
        <div><strong>Zadání:</strong> <span id="rTitle">—</span></div>
        <div><strong>Aktuální úroveň:</strong> <span id="rLevel">—</span></div>
        <div><strong>Body:</strong> <span id="rPoints">0</span></div>
        <div><strong>Úspěšnost:</strong> <span id="rPercent">0 %</span></div>
        <div><strong>Slovní hodnocení:</strong> <span id="rWord">—</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const ROWS=12,COLS=8,LETTERS="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),KEY="adaptive_editor_v1";
const state={teacherPin:"1234",adminUnlocked:false,scriptUrl:"",title:"Adaptivní práce s tabulkou",tasks:[],studentName:"",studentClass:"",currentIndex:0,points:0,maxPoints:0,cells:{},selected:"A1",rangeStart:"A1",rangeEnd:"A1",dragging:false,mode:"teacher"};
function $(id){return document.getElementById(id)} function key(r,c){return LETTERS[c]+(r+1)} function parseKey(k){const m=/^([A-Z]+)(\d+)$/.exec(k||"A1"); return {c:LETTERS.indexOf(m[1]),r:Number(m[2])-1}}
function getCell(k){if(!state.cells[k]) state.cells[k]={value:"",bold:false,align:"left",fill:""}; return state.cells[k]}
function defaults(){return[
 {level:"Lehká",text:"Označ buňku C4 a napiš do ní text Jaro.",targetCell:"C4",targetText:"Jaro",points:5},
 {level:"Střední",text:"Do buňky D5 napiš Výsledek, nastav tučné písmo a zarovnání na střed.",targetCell:"D5",targetText:"Výsledek",bold:true,align:"center",points:10},
 {level:"Těžká",text:"Do buňky B3 napiš Data, nastav tučné písmo, zarovnání na střed a žlutou výplň.",targetCell:"B3",targetText:"Data",bold:true,align:"center",fill:"#fff59d",points:15}
]}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function load(){const raw=localStorage.getItem(KEY); if(raw) Object.assign(state,JSON.parse(raw)); applyUrlMode(); if(!state.tasks.length) state.tasks=defaults(); sync(); renderSheet(); renderReport()}
function sync(){ $("studentName").value=state.studentName; $("studentClass").value=state.studentClass; $("teacherPin").value=state.teacherPin; $("scriptUrl").value=state.scriptUrl; $("adminTitle").value=state.title; $("taskJson").value=JSON.stringify(state.tasks,null,2); const t=state.tasks[state.currentIndex]||{}; $("taskTitle").value=state.title; $("taskText").value=t.text||""; $("taskLevel").value=t.level||"—"; $("rName").textContent=state.studentName||"—"; $("rClass").textContent=state.studentClass||"—"; $("rTitle").textContent=state.title||"—"; $("rLevel").textContent=t.level||"—"; }
function status(msg,bad=false){const s=$("status"); s.textContent=msg; s.style.background=bad?"#fff1f2":"#f8fafc"; s.style.borderColor=bad?"#fecdd3":"#d9e2ef"}
function bounds(){const a=parseKey(state.rangeStart),b=parseKey(state.rangeEnd); return {r1:Math.min(a.r,b.r),r2:Math.max(a.r,b.r),c1:Math.min(a.c,b.c),c2:Math.max(a.c,b.c)}}
function inRange(r,c){const b=bounds(); return r>=b.r1&&r<=b.r2&&c>=b.c1&&c<=b.c2}
function renderSheet(){const table=$("sheet"); table.innerHTML=""; const b=bounds(); const hr=document.createElement("tr"); hr.appendChild(document.createElement("th")); for(let c=0;c<COLS;c++){const th=document.createElement("th"); th.textContent=LETTERS[c]; hr.appendChild(th)} table.appendChild(hr); for(let r=0;r<ROWS;r++){const tr=document.createElement("tr"); const th=document.createElement("th"); th.textContent=r+1; tr.appendChild(th); for(let c=0;c<COLS;c++){const k=key(r,c),cell=getCell(k),td=document.createElement("td"); td.textContent=cell.value||""; td.style.fontWeight=cell.bold?"700":"400"; td.style.textAlign=cell.align||"left"; if(cell.fill) td.style.background=cell.fill; if(k===state.selected) td.classList.add("active"); else if(inRange(r,c)) td.classList.add("range"); td.addEventListener("pointerdown",(e)=>{e.preventDefault(); state.dragging=true; state.selected=k; state.rangeStart=k; state.rangeEnd=k; renderSheet()}); td.addEventListener("pointerenter",()=>{if(state.dragging){state.rangeEnd=k; renderSheet()}}); td.addEventListener("pointerup",()=>state.dragging=false); tr.appendChild(td)} table.appendChild(tr)}}
document.addEventListener("pointerup",()=>state.dragging=false)
function applySel(fn){const b=bounds(); for(let r=b.r1;r<=b.r2;r++) for(let c=b.c1;c<=b.c2;c++) fn(getCell(key(r,c))); renderSheet(); save()}
function evaluate(){const t=state.tasks[state.currentIndex]; if(!t){status("Nejsou načtené úlohy.",true); return} const c=getCell(t.targetCell||"A1"); let ok=true, miss=[]; if((c.value||"")!==(t.targetText||"")){ok=false; miss.push("text")} if(t.bold!==undefined && !!c.bold!==!!t.bold){ok=false; miss.push("tučné")} if(t.align && (c.align||"left")!==t.align){ok=false; miss.push("zarovnání")} if(t.fill && (c.fill||"")!==t.fill){ok=false; miss.push("výplň")} state.maxPoints += Number(t.points||0); if(ok) state.points += Number(t.points||0); if(ok && state.currentIndex < state.tasks.length-1) state.currentIndex++; else if(!ok && state.currentIndex > 0) state.currentIndex--; sync(); renderReport(); save(); status(ok ? "Správně. Pokračuješ dál." : "Zatím ne. Chybí: "+miss.join(", "), !ok)}
function renderReport(){const pct=state.maxPoints?Math.round((state.points/state.maxPoints)*100):0; $("rPoints").textContent=state.points; $("rPercent").textContent=pct+" %"; $("rWord").textContent=pct>=85?"výborný":pct>=60?"dobrý":"potřebuje procvičit"}
function openAdmin(){if(state.mode==="student") return; if(state.adminUnlocked){$("adminPanel").classList.toggle("hidden"); return} const pin=prompt("Zadej PIN učitele:"); if(pin===state.teacherPin){state.adminUnlocked=true; $("adminPanel").classList.remove("hidden"); status("Admin otevřen.")} else status("Nesprávný PIN.",true)}
function saveAdmin(){state.teacherPin=$("teacherPin").value.trim()||"1234"; state.scriptUrl=$("scriptUrl").value.trim(); state.title=$("adminTitle").value.trim()||"Adaptivní práce s tabulkou"; try{state.tasks=JSON.parse($("taskJson").value); state.currentIndex=0; sync(); save(); status("Nastavení učitele bylo uloženo.")}catch(e){status("JSON úloh není platný.",true)}}
function openShare(){if(state.mode==="student") return; const payload=encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify({title:state.title,tasks:state.tasks}))))); const url=location.origin+location.pathname+"?mode=student&share="+payload; $("sharePanel").classList.remove("hidden"); $("shareUrl").value=url; $("qr").innerHTML='<img alt="QR kód" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(url)+'">'; status("Byl vytvořen odkaz a QR pro žáky.")}
function copyLink(){navigator.clipboard.writeText($("shareUrl").value).then(()=>status("Odkaz byl zkopírován."))}
function applyUrlMode(){const p=new URLSearchParams(location.search); if(p.get("mode")==="student"){state.mode="student"; $("adminBtn").classList.add("hidden"); $("shareBtn").classList.add("hidden")} if(p.get("share")){try{const d=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(p.get("share")))))); state.title=d.title||state.title; state.tasks=d.tasks||state.tasks}catch(e){}}}
async function submit(){state.studentName=$("studentName").value.trim(); state.studentClass=$("studentClass").value.trim(); if(!state.studentName||!state.studentClass){status("Vyplň jméno a třídu.",true); return} if(!state.scriptUrl){status("V adminu chybí Google Apps Script URL.",true); return} const payload={action:"submitAdaptive",studentName:state.studentName,class:state.studentClass,assignmentTitle:state.title,points:state.points,maxPoints:state.maxPoints,percent:state.maxPoints?Math.round((state.points/state.maxPoints)*100):0,currentLevel:(state.tasks[state.currentIndex]||{}).level||""}; try{const res=await fetch(state.scriptUrl,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}); const txt=await res.text(); let data={}; try{data=JSON.parse(txt)}catch(e){} if(data.status==="success") status("Odesláno do Google tabulky."); else status("Odpověď serveru nebyla očekávaná.\n"+txt,true)}catch(err){status("Odeslání selhalo.\n"+err,true)}}
async function refreshDash(){if(!state.scriptUrl){status("V adminu chybí Google Apps Script URL.",true); return} try{const url=state.scriptUrl+(state.scriptUrl.includes("?")?"&":"?")+"action=getDashboard"; const res=await fetch(url); const data=await res.json(); $("dashboardPanel").classList.remove("hidden"); if(data.status!=="success"){ $("dashSummary").textContent="Dashboard se nepodařilo načíst."; return } $("dashSummary").textContent=`Žáků: ${data.items.length}`; $("dashList").innerHTML=data.items.map(x=>`<div class="item"><strong>${x.studentName}</strong> · ${x.class} · ${x.percent} %<br><span class="muted">${x.assignmentTitle} · ${x.currentLevel||""}</span></div>`).join("")}catch(err){$("dashboardPanel").classList.remove("hidden"); $("dashSummary").textContent="Dashboard se nepodařilo načíst."}}
function pdfReport(){window.print()}
$("adminBtn").addEventListener("click",openAdmin); $("shareBtn").addEventListener("click",openShare); $("copyLinkBtn").addEventListener("click",copyLink); $("evalBtn").addEventListener("click",evaluate); $("pdfBtn").addEventListener("click",pdfReport); $("dashBtn").addEventListener("click",refreshDash); $("refreshDashBtn").addEventListener("click",refreshDash); $("saveAdminBtn").addEventListener("click",saveAdmin); $("defaultBtn").addEventListener("click",()=>{$("taskJson").value=JSON.stringify(defaults(),null,2)}); $("boldBtn").addEventListener("click",()=>applySel(c=>c.bold=!c.bold)); $("centerBtn").addEventListener("click",()=>applySel(c=>c.align="center")); $("fillBtn").addEventListener("click",()=>applySel(c=>c.fill="#fff59d")); $("clearBtn").addEventListener("click",()=>applySel(c=>{c.value="";c.bold=false;c.align="left";c.fill=""})); $("submitBtn").addEventListener("click",submit); $("studentName").addEventListener("input",()=>{state.studentName=$("studentName").value.trim(); save(); sync()}); $("studentClass").addEventListener("input",()=>{state.studentClass=$("studentClass").value.trim(); save(); sync()});
load();
</script>
</body>
</html>
